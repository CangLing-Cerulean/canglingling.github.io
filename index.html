<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沧翎翎的小窝</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            color: #2d3748;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 234, 252, 0.9);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .admin-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.9);
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: white;
        }

        .btn-danger {
            background: #fc8181;
            color: white;
        }

        .btn-danger:hover {
            background: #f56565;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .modal input:focus, .modal textarea:focus {
            border-color: #667eea;
        }

        .modal .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .hero {
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero h1 {
            font-size: 44px;
            font-weight: 800;
            color: #1a202c;
            line-height: 1.3;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .hero h2 {
            font-size: 44px;
            font-weight: 800;
            color: #1a202c;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 32px 36px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out backwards;
            position: relative;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
        .card:nth-child(5) { animation-delay: 0.4s; }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.92);
        }

        .card.dragging {
            opacity: 0.5;
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            cursor: grabbing;
        }

        .card.drag-over {
            border-top: 3px solid #667eea;
            transform: translateY(8px);
        }

        .card h3 {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 22px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }

        .card p {
            font-size: 16px;
            line-height: 1.9;
            color: #4a5568;
        }

        .card.editable {
            border: 2px dashed #667eea;
        }

        .card .card-actions {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            gap: 6px;
        }

        .card.editable .card-actions {
            display: flex;
        }

        .card-actions .btn {
            padding: 4px 10px;
            font-size: 12px;
        }

        .drag-handle {
            display: none;
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            cursor: grab;
            font-size: 20px;
            padding: 8px;
        }

        .card.editable .drag-handle {
            display: block;
        }

        .card.editable h3 {
            padding-left: 36px;
        }

        .gallery-section {
            margin-bottom: 24px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #f7fafc;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .delete-btn {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(252, 129, 129, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            align-items: center;
            justify-content: center;
        }

        .editable .gallery-item .delete-btn {
            display: flex;
        }

        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #718096;
        }

        .upload-area:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-area input {
            display: none;
        }

        .comments-section {
            margin-top: 40px;
        }

        .comment-form {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }

        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            border-color: #667eea;
        }

        .comment-form textarea {
            min-height: 100px;
        }

        .comment-item {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            position: relative;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .comment-author {
            font-weight: 600;
            color: #1a202c;
            font-size: 15px;
        }

        .comment-time {
            font-size: 13px;
            color: #a0aec0;
        }

        .comment-content {
            color: #4a5568;
            line-height: 1.7;
            font-size: 15px;
        }

        .comment-delete {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #fc8181;
            cursor: pointer;
            font-size: 18px;
        }

        .editable .comment-delete {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #718096;
            font-size: 14px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            .container {
                padding: 50px 16px 40px;
            }
            
            .hero h1, .hero h2 {
                font-size: 32px;
            }
            
            .card {
                padding: 24px 22px;
                border-radius: 16px;
            }
            
            .card h3 {
                font-size: 19px;
            }
            
            .card p {
                font-size: 15px;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .admin-bar {
                top: 10px;
                right: 10px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
                color: #e2e8f0;
            }
            
            .hero h1, .hero h2 {
                color: #f7fafc;
            }
            
            .card, .comment-form, .comment-item {
                background: rgba(30, 41, 59, 0.8);
                border-color: rgba(255, 255, 255, 0.08);
            }
            
            .card:hover {
                background: rgba(30, 41, 59, 0.9);
            }
            
            .card h3 {
                color: #f7fafc;
            }
            
            .card p, .comment-content {
                color: #a0aec0;
            }

            .comment-form input,
            .comment-form textarea {
                background: rgba(30, 41, 59, 0.6);
                border-color: rgba(255,255,255,0.1);
                color: #e2e8f0;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top:20px;color:#667eea;font-weight:500;">正在同步数据...</p>
        <p id="loadingStatus" style="margin-top:10px;color:#718096;font-size:13px;">初始化中</p>
    </div>

    <div class="admin-bar">
        <button class="btn btn-secondary" id="adminBtn" onclick="toggleAdmin()">🐾 沧翎</button>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h3>🔐 验证身份</h3>
            <input type="password" id="passwordInput" placeholder="请输入密码" onkeypress="if(event.key==='Enter')login()">
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="login()">确认</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addCardModal">
        <div class="modal">
            <h3>➕ 添加信息栏</h3>
            <input type="text" id="newCardTitle" placeholder="标题">
            <textarea id="newCardContent" placeholder="内容" style="width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:15px;min-height:100px;resize:vertical;outline:none;font-family:inherit;margin-bottom:16px;"></textarea>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeAddCardModal()">取消</button>
                <button class="btn btn-primary" onclick="addCard()">添加</button>
            </div>
        </div>
    </div>

    <div class="bg-decoration"></div>
    
    <div class="container">
        <div class="hero" id="heroSection">
            <h1 id="heroTitle1">嗨嗨！你好嗷~</h1>
            <h2 id="heroTitle2">欢迎你发现了这里</h2>
        </div>

        <div id="cardsContainer"></div>

        <div class="card gallery-section" id="galleryCard">
            <h3>📷 图片展示</h3>
            <div class="gallery-grid" id="galleryGrid"></div>
            <div class="upload-area" id="uploadArea" style="display:none;margin-top:16px;" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleUpload(event)">
                <div style="font-size:40px;margin-bottom:8px;">📤</div>
                <div>点击或拖拽上传图片</div>
            </div>
        </div>

        <div class="comments-section" id="commentsSection">
            <div class="card">
                <h3>💬 留言板</h3>
                <div class="comment-form">
                    <input type="text" id="commentName" placeholder="你的昵称" maxlength="20">
                    <textarea id="commentText" placeholder="写下你想说的话..." maxlength="500"></textarea>
                    <button class="btn btn-primary" onclick="addComment()">发布留言</button>
                </div>
                <div id="commentsList"></div>
            </div>
        </div>

        <div class="footer">
            <p>© 沧翎翎的小窝 · 永远做不完的网站</p>
        </div>
    </div>

    <script>
        const CONFIG = {
            OWNER: 'CangLing-Cerulean',
            REPO: 'canglingling',
            TOKEN: 'TOKEN_PLACEHOLDER',
            ADMIN_PASSWORD: 'cangling',
            LABEL_CARDS: 'data-cards',
            LABEL_GALLERY: 'data-gallery',
            LABEL_COMMENTS: 'data-comments'
        };

        let isAdmin = false;
        let cards = [];
        let gallery = [];
        let comments = [];
        let draggedCard = null;

        const GitHubAPI = {
            async getIssues(label) {
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues?labels=${label}&state=all&per_page=100`;
                const response = await fetch(url, {
                    headers: CONFIG.TOKEN !== 'TOKEN_PLACEHOLDER' ? {
                        'Authorization': `token ${CONFIG.TOKEN}`
                    } : {}
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            },

            async createIssue(title, body, labels) {
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({ title, body, labels })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || `HTTP ${response.status}`);
                }
                return await response.json();
            },

            async updateIssue(number, title, body) {
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues/${number}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({ title, body })
                });
                if (!response.ok) throw new Error('更新失败');
                return await response.json();
            },

            async closeIssue(number) {
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues/${number}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({ state: 'closed' })
                });
                if (!response.ok) throw new Error('删除失败');
                return await response.json();
            },

            // 上传文件到仓库
            async uploadFile(path, content, message) {
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${path}`;
                
                // 先获取当前文件的 sha（如果存在）
                let sha = null;
                try {
                    const getResponse = await fetch(url, {
                        headers: {
                            'Authorization': `token ${CONFIG.TOKEN}`
                        }
                    });
                    if (getResponse.ok) {
                        const data = await getResponse.json();
                        sha = data.sha;
                    }
                } catch (e) {
                    // 文件不存在，忽略错误
                }

                const body = {
                    message: message || 'Upload image',
                    content: content, // Base64 编码的内容
                    branch: 'main'
                };
                
                if (sha) {
                    body.sha = sha;
                }

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify(body)
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data.content.download_url; // 返回图片 URL
            }
        };

        // 图片压缩 - 更激进的压缩
        async function compressImage(file, maxWidth = 600, maxHeight = 600, quality = 0.5) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // 计算缩放比例
                    const scale = Math.min(
                        maxWidth / width,
                        maxHeight / height,
                        1
                    );
                    
                    width *= scale;
                    height *= scale;
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 尝试 JPEG 格式，质量 0.5
                    let dataUrl = canvas.toDataURL('image/jpeg', quality);
                    
                    // 如果还是太大，进一步压缩
                    let attempts = 0;
                    while (dataUrl.length > 40000 && attempts < 3) { // 限制 40KB
                        quality *= 0.7;
                        maxWidth *= 0.8;
                        maxHeight *= 0.8;
                        
                        const newCanvas = document.createElement('canvas');
                        newCanvas.width = maxWidth;
                        newCanvas.height = maxHeight;
                        newCanvas.getContext('2d').drawImage(img, 0, 0, maxWidth, maxHeight);
                        dataUrl = newCanvas.toDataURL('image/jpeg', quality);
                        attempts++;
                    }
                    
                    resolve(dataUrl);
                };
                img.onerror = reject;
                
                const reader = new FileReader();
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            });
        }

        async function init() {
            updateStatus('加载中...');
            
            // 强制从 GitHub 加载，不用本地缓存
            const hasToken = CONFIG.TOKEN && 
                             CONFIG.TOKEN !== 'TOKEN_PLACEHOLDER' && 
                             CONFIG.TOKEN.startsWith('ghp_');
            
            if (hasToken) {
                updateStatus('同步云端数据...');
                try {
                    await loadAllData();
                    renderAll();
                    saveToLocal(); // 同步完成后保存到本地作为备份
                } catch (error) {
                    console.error('云端同步失败:', error);
                    // 云端失败时尝试本地缓存
                    loadFromLocal();
                    renderAll();
                    
                    if (cards.length === 0) {
                        showError('云端同步失败: ' + error.message);
                    } else {
                        showToast('⚠️ 使用本地缓存');
                    }
                }
            } else {
                // 无 Token，只能用本地缓存
                loadFromLocal();
                renderAll();
                if (cards.length === 0) {
                    showError('配置错误，请刷新或联系管理员');
                }
            }
            
            hideLoading();
        }

        function updateStatus(text) {
            const el = document.getElementById('loadingStatus');
            if (el) el.textContent = text;
        }

        function showError(message) {
            const container = document.querySelector('.container');
            const existing = container.querySelector('.error-message');
            if (existing) existing.remove();
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = message;
            container.insertBefore(errorDiv, container.firstChild);
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        async function loadAllData() {
            cards = [];
            gallery = [];
            comments = [];

            let hasError = false;

            try {
                const cardIssues = await GitHubAPI.getIssues(CONFIG.LABEL_CARDS);
                cards = cardIssues
                    .filter(issue => issue.state === 'open')
                    .map(issue => ({
                        id: issue.number,
                        title: issue.title,
                        content: issue.body || '',
                        issueNumber: issue.number
                    }));
            } catch (e) {
                console.log('GitHub 卡片加载失败:', e.message);
                hasError = true;
            }

            try {
                const galleryIssues = await GitHubAPI.getIssues(CONFIG.LABEL_GALLERY);
                gallery = galleryIssues
                    .filter(issue => issue.state === 'open')
                    .map(issue => ({
                        url: issue.body,
                        issueNumber: issue.number
                    }))
                    .filter(item => item.url);
            } catch (e) {
                console.log('GitHub 图片加载失败:', e.message);
                hasError = true;
            }

            try {
                const commentIssues = await GitHubAPI.getIssues(CONFIG.LABEL_COMMENTS);
                comments = commentIssues
                    .filter(issue => issue.state === 'open')
                    .map(issue => {
                        try {
                            const data = JSON.parse(issue.body);
                            return {
                                name: data.name,
                                text: data.text,
                                time: data.time,
                                issueNumber: issue.number
                            };
                        } catch {
                            return null;
                        }
                    })
                    .filter(Boolean);
            } catch (e) {
                console.log('GitHub 评论加载失败:', e.message);
                hasError = true;
            }

            // 按 order 标记排序
            cards.sort((a, b) => {
                const orderA = (a.content.match(/<!-- order:(\d+) -->/) || [0, 999])[1];
                const orderB = (b.content.match(/<!-- order:(\d+) -->/) || [0, 999])[1];
                return parseInt(orderA) - parseInt(orderB);
            });

            if (hasError && cards.length === 0 && gallery.length === 0 && comments.length === 0) {
                throw new Error('所有数据加载失败');
            }
        }

        function saveToLocal() {
            localStorage.setItem('cangling_cache', JSON.stringify({ cards, gallery, comments }));
        }

        function loadFromLocal() {
            const cache = localStorage.getItem('cangling_cache');
            if (cache) {
                try {
                    const data = JSON.parse(cache);
                    cards = data.cards || [];
                    gallery = data.gallery || [];
                    comments = data.comments || [];
                } catch (e) {
                    console.error('解析本地缓存失败:', e);
                    cards = [];
                    gallery = [];
                    comments = [];
                }
            }
        }

        function toggleAdmin() {
            if (isAdmin) {
                logout();
            } else {
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('passwordInput').focus();
            }
        }

        function login() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === CONFIG.ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('adminBtn').textContent = '🐾 沧翎';
                document.getElementById('adminBtn').classList.remove('btn-secondary');
                document.getElementById('adminBtn').classList.add('btn-danger');
                closeModal();
                renderAll();
                showToast('✅ 管理模式已开启');
            } else {
                showToast('❌ 密码错误');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('adminBtn').textContent = '🐾 沧翎';
            document.getElementById('adminBtn').classList.remove('btn-danger');
            document.getElementById('adminBtn').classList.add('btn-secondary');
            renderAll();
            showToast('已退出管理');
        }

        function closeModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('passwordInput').value = '';
        }

        // 拖拽排序
        function initDragEvents(cardEl, card) {
            cardEl.draggable = true;
            
            cardEl.addEventListener('dragstart', (e) => {
                draggedCard = card;
                cardEl.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            
            cardEl.addEventListener('dragend', () => {
                cardEl.classList.remove('dragging');
                draggedCard = null;
                document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
            });
            
            cardEl.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (draggedCard && draggedCard !== card) {
                    cardEl.classList.add('drag-over');
                }
            });
            
            cardEl.addEventListener('dragleave', () => {
                cardEl.classList.remove('drag-over');
            });
            
            cardEl.addEventListener('drop', async (e) => {
                e.preventDefault();
                cardEl.classList.remove('drag-over');
                
                if (!draggedCard || draggedCard === card) return;
                
                const fromIndex = cards.findIndex(c => c.issueNumber === draggedCard.issueNumber);
                const toIndex = cards.findIndex(c => c.issueNumber === card.issueNumber);
                
                if (fromIndex === -1 || toIndex === -1) return;
                
                // 移动数组元素
                cards.splice(fromIndex, 1);
                cards.splice(toIndex, 0, draggedCard);
                
                saveToLocal();
                renderCards();
                showToast('顺序已更新');
                
                // 同步到云端
                try {
                    for (let i = 0; i < cards.length; i++) {
                        const c = cards[i];
                        const orderMarker = `<!-- order:${i} -->`;
                        let newContent;
                        if (c.content.includes('<!-- order:')) {
                            newContent = c.content.replace(/<!-- order:\d+ -->/, orderMarker);
                        } else {
                            newContent = c.content + '\n\n' + orderMarker;
                        }
                        await GitHubAPI.updateIssue(c.issueNumber, c.title, newContent);
                        c.content = newContent;
                    }
                    saveToLocal();
                } catch (err) {
                    console.error('同步顺序失败:', err);
                    showToast('⚠️ 本地顺序已保存，云端同步失败');
                }
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            cards.forEach((card) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${isAdmin ? 'editable' : ''}`;
                cardEl.dataset.issueNumber = card.issueNumber;
                
                if (isAdmin) {
                    initDragEvents(cardEl, card);
                }
                
                cardEl.innerHTML = `
                    ${isAdmin ? '<div class="drag-handle">⋮⋮</div>' : ''}
                    <div class="card-actions">
                        <button class="btn btn-danger btn-sm" onclick="deleteCard(${card.issueNumber})">删除</button>
                    </div>
                    <h3 contenteditable="${isAdmin}" onblur="saveCard(${card.issueNumber}, 'title', this.innerText)">${escapeHtml(card.title)}</h3>
                    <p contenteditable="${isAdmin}" onblur="saveCard(${card.issueNumber}, 'content', this.innerText)">${escapeHtml(card.content.replace(/<!-- order:\d+ -->/g, ''))}</p>
                `;
                container.appendChild(cardEl);
            });

            if (isAdmin) {
                const addBtn = document.createElement('div');
                addBtn.className = 'card';
                addBtn.style.cssText = 'text-align:center;cursor:pointer;border:3px dashed #cbd5e0;background:rgba(255,255,255,0.5);';
                addBtn.innerHTML = '<div style="font-size:40px;color:#667eea;margin-bottom:8px;">+</div><div style="color:#667eea;font-weight:600;">添加信息栏</div>';
                addBtn.onclick = () => document.getElementById('addCardModal').classList.add('active');
                container.appendChild(addBtn);
            }
        }

        async function saveCard(issueNumber, field, value) {
            if (!isAdmin) return;
            
            const card = cards.find(c => c.issueNumber === issueNumber);
            if (!card) {
                showToast('❌ 找不到卡片');
                return;
            }
            
            const cleanValue = value.replace(/<!-- order:\d+ -->/g, '').trim();
            const newTitle = field === 'title' ? cleanValue : card.title;
            const newContent = field === 'content' ? cleanValue : card.content.replace(/<!-- order:\d+ -->/g, '');
            
            // 保留 order 标记
            const orderMatch = card.content.match(/<!-- order:(\d+) -->/);
            const orderMarker = orderMatch ? `<!-- order:${orderMatch[1]} -->` : '';
            const finalContent = newContent + (orderMarker ? '\n\n' + orderMarker : '');
            
            if (newTitle === card.title && finalContent === card.content) return;
            
            try {
                await GitHubAPI.updateIssue(card.issueNumber, newTitle, finalContent);
                card.title = newTitle;
                card.content = finalContent;
                saveToLocal();
                showToast('已保存');
            } catch (error) {
                showToast('❌ 保存失败: ' + error.message);
                console.error('Save error:', error);
            }
        }

        async function deleteCard(issueNumber) {
            if (!isAdmin) return;
            if (!confirm('确定要删除这个信息栏吗？')) return;

            try {
                await GitHubAPI.closeIssue(issueNumber);
                cards = cards.filter(c => c.issueNumber !== issueNumber);
                saveToLocal();
                renderCards();
                showToast('已删除');
            } catch (error) {
                showToast('❌ 删除失败: ' + error.message);
            }
        }

        function closeAddCardModal() {
            document.getElementById('addCardModal').classList.remove('active');
            document.getElementById('newCardTitle').value = '';
            document.getElementById('newCardContent').value = '';
        }

        async function addCard() {
            const title = document.getElementById('newCardTitle').value.trim();
            const content = document.getElementById('newCardContent').value.trim();
            
            if (!title || !content) {
                showToast('请填写标题和内容');
                return;
            }

            try {
                const order = cards.length;
                const contentWithOrder = content + `\n\n<!-- order:${order} -->`;
                const issue = await GitHubAPI.createIssue(title, contentWithOrder, [CONFIG.LABEL_CARDS]);
                
                cards.push({
                    id: issue.number,
                    title: issue.title,
                    content: issue.body,
                    issueNumber: issue.number
                });
                
                saveToLocal();
                renderCards();
                closeAddCardModal();
                showToast('添加成功');
            } catch (error) {
                showToast('❌ 添加失败: ' + error.message);
            }
        }

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const uploadArea = document.getElementById('uploadArea');
            
            grid.innerHTML = '';
            
            gallery.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${item.url}" alt="图片" onclick="viewImage('${item.url}')">
                    <button class="delete-btn" onclick="deleteImage(${item.issueNumber}, event)">×</button>
                `;
                grid.appendChild(div);
            });

            uploadArea.style.display = isAdmin ? 'block' : 'none';
        }

        async function handleUpload(event) {
            const files = event.target.files;
            if (!files.length) return;

            for (const file of Array.from(files)) {
                if (!file.type.startsWith('image/')) continue;
                
                try {
                    showToast('正在压缩图片...');
                    const compressed = await compressImage(file);
                    
                    // 检查大小
                    const base64Length = compressed.length;
                    const sizeInKB = Math.round(base64Length * 0.75 / 1024);
                    console.log('Compressed size:', sizeInKB, 'KB');
                    
                    if (sizeInKB > 100) {
                        showToast(`图片太大 (${sizeInKB}KB)，跳过`);
                        continue;
                    }
                    
                    showToast('正在上传到 GitHub...');
                    
                    // 提取 Base64 内容（去掉 data:image/jpeg;base64, 前缀）
                    const base64Content = compressed.split(',')[1];
                    
                    // 生成文件名
                    const ext = file.name.split('.').pop() || 'jpg';
                    const filename = `img_${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                    const path = `images/${filename}`;
                    
                    // 上传到仓库
                    const imageUrl = await GitHubAPI.uploadFile(path, base64Content, `Upload ${filename}`);
                    
                    // 创建 Issue 记录
                    await GitHubAPI.createIssue(
                        `image_${filename}`,
                        imageUrl,
                        [CONFIG.LABEL_GALLERY]
                    );
                    
                    await loadAllData();
                    renderGallery();
                    showToast('图片上传成功');
                } catch (err) {
                    showToast('❌ 上传失败: ' + err.message);
                    console.error('Upload error:', err);
                }
            }
            
            event.target.value = '';
        }

        async function deleteImage(issueNumber, event) {
            event.stopPropagation();
            if (!confirm('确定删除这张图片？')) return;

            try {
                await GitHubAPI.closeIssue(issueNumber);
                gallery = gallery.filter(item => item.issueNumber !== issueNumber);
                saveToLocal();
                renderGallery();
                showToast('已删除');
            } catch (error) {
                showToast('❌ 删除失败');
            }
        }

        function viewImage(src) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:3000;display:flex;justify-content:center;align-items:center;cursor:zoom-out;';
            overlay.innerHTML = `<img src="${src}" style="max-width:90%;max-height:90%;border-radius:8px;">`;
            overlay.onclick = () => overlay.remove();
            document.body.appendChild(overlay);
        }

        function renderComments() {
            const list = document.getElementById('commentsList');
            list.innerHTML = '';

            if (comments.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:40px;">还没有留言，来说点什么吧~</div>';
                return;
            }

            comments.slice().reverse().forEach((comment) => {
                const item = document.createElement('div');
                item.className = `comment-item ${isAdmin ? 'editable' : ''}`;
                item.innerHTML = `
                    <button class="comment-delete" onclick="deleteComment(${comment.issueNumber})">×</button>
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.name)}</span>
                        <span class="comment-time">${formatTime(comment.time)}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.text)}</div>
                `;
                list.appendChild(item);
            });
        }

        async function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const text = document.getElementById('commentText').value.trim();

            if (!name || !text) {
                showToast('请填写昵称和留言内容');
                return;
            }

            const data = {
                name: name,
                text: text,
                time: Date.now()
            };

            try {
                await GitHubAPI.createIssue(
                    `comment_${Date.now()}`,
                    JSON.stringify(data),
                    [CONFIG.LABEL_COMMENTS]
                );
                
                await loadAllData();
                renderComments();
                
                document.getElementById('commentName').value = '';
                document.getElementById('commentText').value = '';
                showToast('留言成功');
            } catch (error) {
                showToast('❌ 留言失败: ' + error.message);
            }
        }

        async function deleteComment(issueNumber) {
            if (!isAdmin) return;
            if (!confirm('确定删除这条留言？')) return;

            try {
                await GitHubAPI.closeIssue(issueNumber);
                comments = comments.filter(c => c.issueNumber !== issueNumber);
                saveToLocal();
                renderComments();
                showToast('已删除');
            } catch (error) {
                showToast('❌ 删除失败');
            }
        }

        function renderAll() {
            renderCards();
            renderGallery();
            renderComments();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
            
            return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a202c;color:white;padding:12px 24px;border-radius:12px;z-index:4000;font-size:14px;animation:fadeInUp 0.3s ease;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        const uploadArea = document.getElementById('uploadArea');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            document.getElementById('fileInput').files = files;
            handleUpload({ target: { files } });
        });

        init();
    </script>
</body>
</html>
