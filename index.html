<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沧翎翎的小窝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            color: #2d3748;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 234, 252, 0.9);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .admin-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.9);
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: white;
        }

        .btn-danger {
            background: #fc8181;
            color: white;
        }

        .btn-danger:hover {
            background: #f56565;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .modal input:focus, .modal textarea:focus {
            border-color: #667eea;
        }

        .modal .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .hero {
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero h1 {
            font-size: 44px;
            font-weight: 800;
            color: #1a202c;
            line-height: 1.3;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .hero h2 {
            font-size: 44px;
            font-weight: 800;
            color: #1a202c;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 32px 36px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out backwards;
            position: relative;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
        .card:nth-child(5) { animation-delay: 0.4s; }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.92);
        }

        .card h3 {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 22px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }

        .card p {
            font-size: 16px;
            line-height: 1.9;
            color: #4a5568;
        }

        .card.editable {
            border: 2px dashed #667eea;
        }

        .card .card-actions {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            gap: 6px;
        }

        .card.editable .card-actions {
            display: flex;
        }

        .card-actions .btn {
            padding: 4px 10px;
            font-size: 12px;
        }

        .gallery-section {
            margin-bottom: 24px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #f7fafc;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .delete-btn {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(252, 129, 129, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            align-items: center;
            justify-content: center;
        }

        .editable .gallery-item .delete-btn {
            display: flex;
        }

        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #718096;
        }

        .upload-area:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-area input {
            display: none;
        }

        .comments-section {
            margin-top: 40px;
        }

        .comment-form {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }

        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            border-color: #667eea;
        }

        .comment-form textarea {
            min-height: 100px;
        }

        .comment-item {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            position: relative;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .comment-author {
            font-weight: 600;
            color: #1a202c;
            font-size: 15px;
        }

        .comment-time {
            font-size: 13px;
            color: #a0aec0;
        }

        .comment-content {
            color: #4a5568;
            line-height: 1.7;
            font-size: 15px;
        }

        .comment-delete {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #fc8181;
            cursor: pointer;
            font-size: 18px;
        }

        .editable .comment-delete {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #718096;
            font-size: 14px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            .container {
                padding: 50px 16px 40px;
            }
            
            .hero h1, .hero h2 {
                font-size: 32px;
            }
            
            .card {
                padding: 24px 22px;
                border-radius: 16px;
            }
            
            .card h3 {
                font-size: 19px;
            }
            
            .card p {
                font-size: 15px;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .admin-bar {
                top: 10px;
                right: 10px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
                color: #e2e8f0;
            }
            
            .hero h1, .hero h2 {
                color: #f7fafc;
            }
            
            .card, .comment-form, .comment-item {
                background: rgba(30, 41, 59, 0.8);
                border-color: rgba(255, 255, 255, 0.08);
            }
            
            .card:hover {
                background: rgba(30, 41, 59, 0.9);
            }
            
            .card h3 {
                color: #f7fafc;
            }
            
            .card p, .comment-content {
                color: #a0aec0;
            }

            .comment-form input,
            .comment-form textarea {
                background: rgba(30, 41, 59, 0.6);
                border-color: rgba(255,255,255,0.1);
                color: #e2e8f0;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top:20px;color:#667eea;font-weight:500;">正在同步数据...</p>
        <p id="loadingStatus" style="margin-top:10px;color:#718096;font-size:13px;">初始化中</p>
    </div>

    <div class="admin-bar">
        <button class="btn btn-secondary" id="adminBtn" onclick="toggleAdmin()">🔒 管理员</button>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h3>🔐 管理员验证</h3>
            <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeypress="if(event.key==='Enter')login()">
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="login()">确认</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addCardModal">
        <div class="modal">
            <h3>➕ 添加信息栏</h3>
            <input type="text" id="newCardTitle" placeholder="标题">
            <textarea id="newCardContent" placeholder="内容" style="width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:15px;min-height:100px;resize:vertical;outline:none;font-family:inherit;margin-bottom:16px;"></textarea>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeAddCardModal()">取消</button>
                <button class="btn btn-primary" onclick="addCard()">添加</button>
            </div>
        </div>
    </div>

    <div class="bg-decoration"></div>
    
    <div class="container">
        <div class="hero" id="heroSection">
            <h1 id="heroTitle1">嗨嗨！你好嗷~</h1>
            <h2 id="heroTitle2">欢迎你发现了这里</h2>
        </div>

        <div id="cardsContainer"></div>

        <div class="card gallery-section" id="galleryCard">
            <h3>📷 图片展示</h3>
            <div class="gallery-grid" id="galleryGrid"></div>
            <div class="upload-area" id="uploadArea" style="display:none;margin-top:16px;" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleUpload(event)">
                <div style="font-size:40px;margin-bottom:8px;">📤</div>
                <div>点击或拖拽上传图片</div>
            </div>
        </div>

        <div class="comments-section" id="commentsSection">
            <div class="card">
                <h3>💬 留言板</h3>
                <div class="comment-form">
                    <input type="text" id="commentName" placeholder="你的昵称" maxlength="20">
                    <textarea id="commentText" placeholder="写下你想说的话..." maxlength="500"></textarea>
                    <button class="btn btn-primary" onclick="addComment()">发布留言</button>
                </div>
                <div id="commentsList"></div>
            </div>
        </div>

        <div class="footer">
            <p>© 沧翎翎的小窝 · 永远做不完的网站</p>
        </div>
    </div>

    <script>
        // ========== 配置（全局唯一） ==========
        const CONFIG = {
            OWNER: 'CangLing-Cerulean',
            REPO: 'canglingling',
            TOKEN: 'TOKEN_PLACEHOLDER',
            ADMIN_PASSWORD: 'cangling',
            LABEL_CARDS: 'data-cards',
            LABEL_GALLERY: 'data-gallery',
            LABEL_COMMENTS: 'data-comments'
        };

        // 挂载到 window，确保全局可访问
        window.CONFIG = CONFIG;

        // ========== 状态 ==========
        let isAdmin = false;
        let cards = [];
        let gallery = [];
        let comments = [];

        // ========== GitHub API 封装 ==========
        const GitHubAPI = {
            async getIssues(label) {
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues?labels=${label}&state=all&per_page=100`;
                const response = await fetch(url, {
                    headers: CONFIG.TOKEN !== 'TOKEN_PLACEHOLDER' ? {
                        'Authorization': `token ${CONFIG.TOKEN}`
                    } : {}
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            },

            async createIssue(title, body, labels) {
                if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                    throw new Error('Token 未配置，无法写入数据');
                }
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({ title, body, labels })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || `HTTP ${response.status}`);
                }
                return await response.json();
            },

            async updateIssue(number, title, body) {
                if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                    throw new Error('Token 未配置，无法更新数据');
                }
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues/${number}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({ title, body })
                });
                if (!response.ok) throw new Error('更新失败');
                return await response.json();
            },

            async closeIssue(number) {
                if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                    throw new Error('Token 未配置，无法删除数据');
                }
                const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/issues/${number}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                        'Authorization': `token ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({ state: 'closed' })
                });
                if (!response.ok) throw new Error('删除失败');
                return await response.json();
            }
        };

        // ========== 初始化 ==========
        async function init() {
            updateStatus('检查配置...');
            
            if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                updateStatus('⚠️ Token 未注入，使用本地模式');
            } else {
                updateStatus('✅ Token 已配置，连接 GitHub...');
            }

            try {
                await loadAllData();
                renderAll();
                hideLoading();
            } catch (error) {
                console.error('初始化失败:', error);
                showError('云端同步失败: ' + error.message);
                loadFromLocal();
                renderAll();
                hideLoading();
            }
        }

        function updateStatus(text) {
            const el = document.getElementById('loadingStatus');
            if (el) el.textContent = text;
        }

        function showError(message) {
            const container = document.querySelector('.container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = message;
            container.insertBefore(errorDiv, container.firstChild);
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // ========== 数据加载 ==========
        async function loadAllData() {
            if (CONFIG.TOKEN !== 'TOKEN_PLACEHOLDER') {
                try {
                    const cardIssues = await GitHubAPI.getIssues(CONFIG.LABEL_CARDS);
                    cards = cardIssues
                        .filter(issue => issue.state === 'open')
                        .map(issue => ({
                            id: issue.number,
                            title: issue.title,
                            content: issue.body || '',
                            issueNumber: issue.number
                        }));
                } catch (e) {
                    console.log('GitHub 卡片加载失败:', e.message);
                }

                try {
                    const galleryIssues = await GitHubAPI.getIssues(CONFIG.LABEL_GALLERY);
                    gallery = galleryIssues
                        .filter(issue => issue.state === 'open')
                        .map(issue => ({
                            url: issue.body,
                            issueNumber: issue.number
                        }))
                        .filter(item => item.url);
                } catch (e) {
                    console.log('GitHub 图片加载失败:', e.message);
                }

                try {
                    const commentIssues = await GitHubAPI.getIssues(CONFIG.LABEL_COMMENTS);
                    comments = commentIssues
                        .filter(issue => issue.state === 'open')
                        .map(issue => {
                            try {
                                const data = JSON.parse(issue.body);
                                return {
                                    name: data.name,
                                    text: data.text,
                                    time: data.time,
                                    issueNumber: issue.number
                                };
                            } catch {
                                return null;
                            }
                        })
                        .filter(Boolean);
                } catch (e) {
                    console.log('GitHub 评论加载失败:', e.message);
                }
            }

            if (cards.length === 0) {
                cards = getDefaultCards();
            }

            saveToLocal();
        }

        function getDefaultCards() {
            return [
                { id: 1, title: '这是什么地方？', content: '这里是沧翎翎的秘密基地，目前主要是展示一些瞎搞的信息。不打算自我解释，觉得没什么内容能写进去，可能以后就会改变主意了呢？' },
                { id: 2, title: '沧翎翎是什么？', content: '沧翎翎是拥有这个网站的小兽太，专注于研究自动化、通用时域模型相关的内容，其实什么都不懂。还是一位福瑞控，最喜欢可爱的小兽太了！' },
                { id: 3, title: '何时才能做完？', content: '沧翎翎不会写代码，不懂得如何设计界面，也不善于表达内容，可能永远也做不完！' },
                { id: 4, title: '想认识沧翎翎？', content: '沧翎翎是超级大社恐，并且只想认识小兽太。目前不会在这里写联系方式，想认识的话就去寻找相关线索啦。' }
            ];
        }

        function saveToLocal() {
            localStorage.setItem('cangling_cache', JSON.stringify({ cards, gallery, comments }));
        }

        function loadFromLocal() {
            const cache = localStorage.getItem('cangling_cache');
            if (cache) {
                const data = JSON.parse(cache);
                cards = data.cards || getDefaultCards();
                gallery = data.gallery || [];
                comments = data.comments || [];
            } else {
                cards = getDefaultCards();
                gallery = [];
                comments = [];
            }
        }

        // ========== 管理员功能 ==========
        function toggleAdmin() {
            if (isAdmin) {
                logout();
            } else {
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('passwordInput').focus();
            }
        }

        function login() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === CONFIG.ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('adminBtn').textContent = '🔓 退出管理';
                document.getElementById('adminBtn').classList.remove('btn-secondary');
                document.getElementById('adminBtn').classList.add('btn-danger');
                closeModal();
                renderAll();
                showToast('✅ 管理员模式已开启');
                
                if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                    showToast('⚠️ Token 未配置，无法保存到云端');
                }
            } else {
                showToast('❌ 密码错误');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('adminBtn').textContent = '🔒 管理员';
            document.getElementById('adminBtn').classList.remove('btn-danger');
            document.getElementById('adminBtn').classList.add('btn-secondary');
            renderAll();
            showToast('已退出管理');
        }

        function closeModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('passwordInput').value = '';
        }

        // ========== 信息栏管理 ==========
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            cards.forEach((card) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${isAdmin ? 'editable' : ''}`;
                cardEl.innerHTML = `
                    <div class="card-actions">
                        <button class="btn btn-danger btn-sm" onclick="deleteCard(${card.issueNumber || card.id})">删除</button>
                    </div>
                    <h3 contenteditable="${isAdmin}" onblur="updateCard(${card.issueNumber || card.id}, this.innerText, '${escapeHtml(card.content)}')">${card.title}</h3>
                    <p contenteditable="${isAdmin}" onblur="updateCard(${card.issueNumber || card.id}, '${escapeHtml(card.title)}', this.innerText)">${card.content}</p>
                `;
                container.appendChild(cardEl);
            });

            if (isAdmin) {
                const addBtn = document.createElement('div');
                addBtn.className = 'card';
                addBtn.style.cssText = 'text-align:center;cursor:pointer;border:3px dashed #cbd5e0;background:rgba(255,255,255,0.5);';
                addBtn.innerHTML = '<div style="font-size:40px;color:#667eea;margin-bottom:8px;">+</div><div style="color:#667eea;font-weight:600;">添加信息栏</div>';
                addBtn.onclick = () => document.getElementById('addCardModal').classList.add('active');
                container.appendChild(addBtn);
            }
        }

        async function updateCard(number, title, content) {
            if (!isAdmin) return;
            
            try {
                if (!number || number <= 4) {
                    if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                        showToast('❌ Token 未配置，无法保存');
                        return;
                    }
                    const issue = await GitHubAPI.createIssue(title, content, [CONFIG.LABEL_CARDS]);
                    await loadAllData();
                    renderCards();
                    showToast('已保存到云端');
                    return;
                }

                await GitHubAPI.updateIssue(number, title, content);
                await loadAllData();
                renderCards();
                showToast('已保存');
            } catch (error) {
                showToast('❌ 保存失败: ' + error.message);
            }
        }

        async function deleteCard(number) {
            if (!isAdmin) return;
            if (!confirm('确定要删除这个信息栏吗？')) return;

            try {
                if (number > 4) {
                    if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                        showToast('❌ Token 未配置，无法删除');
                        return;
                    }
                    await GitHubAPI.closeIssue(number);
                }
                await loadAllData();
                renderCards();
                showToast('已删除');
            } catch (error) {
                showToast('❌ 删除失败: ' + error.message);
            }
        }

        function closeAddCardModal() {
            document.getElementById('addCardModal').classList.remove('active');
            document.getElementById('newCardTitle').value = '';
            document.getElementById('newCardContent').value = '';
        }

        async function addCard() {
            const title = document.getElementById('newCardTitle').value.trim();
            const content = document.getElementById('newCardContent').value.trim();
            
            if (!title || !content) {
                showToast('请填写标题和内容');
                return;
            }

            if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                showToast('❌ Token 未配置，无法添加');
                return;
            }

            try {
                await GitHubAPI.createIssue(title, content, [CONFIG.LABEL_CARDS]);
                await loadAllData();
                renderCards();
                closeAddCardModal();
                showToast('添加成功');
            } catch (error) {
                showToast('❌ 添加失败: ' + error.message);
            }
        }

        // ========== 图片展示区 ==========
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const uploadArea = document.getElementById('uploadArea');
            
            grid.innerHTML = '';
            
            gallery.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${item.url}" alt="图片" onclick="viewImage('${item.url}')">
                    <button class="delete-btn" onclick="deleteImage(${item.issueNumber}, event)">×</button>
                `;
                grid.appendChild(div);
            });

            uploadArea.style.display = isAdmin ? 'block' : 'none';
        }

        async function handleUpload(event) {
            const files = event.target.files;
            if (!files.length) return;

            if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                showToast('❌ Token 未配置，无法上传');
                return;
            }

            for (const file of Array.from(files)) {
                if (!file.type.startsWith('image/')) continue;
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result;
                    const title = `img_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                    
                    try {
                        await GitHubAPI.createIssue(title, base64, [CONFIG.LABEL_GALLERY]);
                        await loadAllData();
                        renderGallery();
                        showToast('图片上传成功');
                    } catch (err) {
                        showToast('❌ 上传失败: ' + err.message);
                    }
                };
                reader.readAsDataURL(file);
            }
            
            event.target.value = '';
        }

        async function deleteImage(number, event) {
            event.stopPropagation();
            if (!confirm('确定删除这张图片？')) return;

            if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                showToast('❌ Token 未配置，无法删除');
                return;
            }

            try {
                await GitHubAPI.closeIssue(number);
                await loadAllData();
                renderGallery();
                showToast('已删除');
            } catch (error) {
                showToast('❌ 删除失败');
            }
        }

        function viewImage(src) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:3000;display:flex;justify-content:center;align-items:center;cursor:zoom-out;';
            overlay.innerHTML = `<img src="${src}" style="max-width:90%;max-height:90%;border-radius:8px;">`;
            overlay.onclick = () => overlay.remove();
            document.body.appendChild(overlay);
        }

        // ========== 评论区 ==========
        function renderComments() {
            const list = document.getElementById('commentsList');
            list.innerHTML = '';

            if (comments.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:40px;">还没有留言，来说点什么吧~</div>';
                return;
            }

            comments.slice().reverse().forEach((comment) => {
                const item = document.createElement('div');
                item.className = `comment-item ${isAdmin ? 'editable' : ''}`;
                item.innerHTML = `
                    <button class="comment-delete" onclick="deleteComment(${comment.issueNumber})">×</button>
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.name)}</span>
                        <span class="comment-time">${formatTime(comment.time)}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.text)}</div>
                `;
                list.appendChild(item);
            });
        }

        async function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const text = document.getElementById('commentText').value.trim();

            if (!name || !text) {
                showToast('请填写昵称和留言内容');
                return;
            }

            if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                showToast('❌ Token 未配置，无法留言');
                return;
            }

            const data = {
                name: name,
                text: text,
                time: Date.now()
            };

            try {
                await GitHubAPI.createIssue(
                    `comment_${Date.now()}`,
                    JSON.stringify(data),
                    [CONFIG.LABEL_COMMENTS]
                );
                
                await loadAllData();
                renderComments();
                
                document.getElementById('commentName').value = '';
                document.getElementById('commentText').value = '';
                showToast('留言成功');
            } catch (error) {
                showToast('❌ 留言失败: ' + error.message);
            }
        }

        async function deleteComment(number) {
            if (!isAdmin) return;
            if (!confirm('确定删除这条留言？')) return;

            if (CONFIG.TOKEN === 'TOKEN_PLACEHOLDER') {
                showToast('❌ Token 未配置，无法删除');
                return;
            }

            try {
                await GitHubAPI.closeIssue(number);
                await loadAllData();
                renderComments();
                showToast('已删除');
            } catch (error) {
                showToast('❌ 删除失败');
            }
        }

        // ========== 渲染全部 ==========
        function renderAll() {
            renderCards();
            renderGallery();
            renderComments();
        }

        // ========== 工具函数 ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
            
            return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a202c;color:white;padding:12px 24px;border-radius:12px;z-index:4000;font-size:14px;animation:fadeInUp 0.3s ease;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // 模态框外部点击关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            document.getElementById('fileInput').files = files;
            handleUpload({ target: { files } });
        });

        // 启动
        init();
    </script>
</body>
</html>
